# Build Astro, puis pousse le contenu de dist/ sur la branche gh-pages.
#
# Sur GitHub : Settings → Pages → Build and deployment
#   Source : Deploy from a branch
#   Branch : gh-pages , dossier / (root)
#
# Si le push échoue : Settings → Actions → General → Workflow permissions
#   cocher « Read and write permissions » (le token doit pouvoir pousser gh-pages).
name: Build and push gh-pages

on:
  push:
    branches: [main, master, V2]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build Astro
        run: npm run build
        env:
          API_KEY_PORTFOLIO: ${{ secrets.API_KEY_PORTFOLIO }}

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
